import:
  - ~/.config/alacritty/colors/green-blue.yml

window:
  padding:
    x: 50
    y: 40
  opacity: 1
  title: Alac
  dynamic_title: true

# Font configuration (changes require restart)
font:
  # The normal (roman) font face to use.
  normal:
    family: JetBrains Mono
    # Style can be specified to pick a specific face.
    style: Medium

  # The bold font face
  bold:
    family: JetBrains Mono
    # Style can be specified to pick a specific face.
    style: Bold

  # The italic font face
  italic:
    family: JetBrains Mono
    # Style can be specified to pick a specific face.
    style: MediumItalic
  bold_italic:
    family: JetBrains Mono
    # Style can be specified to pick a specific face.
    style: BoldItalic
  size: 20

